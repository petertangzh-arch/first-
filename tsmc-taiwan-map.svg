<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700">
  <!-- Background -->
  <rect width="600" height="700" fill="#f0f8ff"/>
  
  <!-- Title -->
  <text x="300" y="40" font-family="Arial, sans-serif" font-size="22" font-weight="bold" text-anchor="middle">TSMC Taiwan Fab Locations</text>
  
  <!-- Taiwan Island (simplified shape) -->
  <path d="M280,80 Q320,90 340,130 Q360,180 330,250 Q310,320 280,380 Q250,440 220,500 Q200,550 220,600 Q260,650 300,620 Q360,580 380,500 Q400,400 380,320 Q360,240 340,180 Q320,120 280,80 Z" 
        fill="#d4e6d4" stroke="#2E7D32" stroke-width="2"/>
  
  <!-- Mountain Range (central) -->
  <path d="M280,200 Q300,250 290,320 Q280,380 300,450" stroke="#8B4513" stroke-width="3" fill="none"/>
  <text x="310" y="340" font-family="Arial" font-size="10" fill="#8B4513">Central Mountains</text>
  
  <!-- Hsinchu - Fab 8 -->
  <circle cx="290" cy="180" r="25" fill="#ff4444" stroke="#cc0000" stroke-width="3"/>
  <text x="290" y="165" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle" fill="#cc0000">Fab 8</text>
  <text x="290" y="178" font-family="Arial" font-size="9" text-anchor="middle">N7/N5</text>
  <text x="290" y="220" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Hsinchu</text>
  <text x="290" y="233" font-family="Arial" font-size="9" text-anchor="middle">(Science Park)</text>
  
  <!-- Taoyuan/Longtan - Fab 16 -->
  <circle cx="330" cy="175" r="20" fill="#ff6666" stroke="#cc0000" stroke-width="2"/>
  <text x="330" y="170" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#cc0000">Fab 16</text>
  <text x="330" y="182" font-family="Arial" font-size="8" text-anchor="middle">N16</text>
  <text x="330" y="210" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Longtan</text>
  
  <!-- Taichung - Fab 15 -->
  <circle cx="290" cy="300" r="22" fill="#ff6666" stroke="#cc0000" stroke-width="2"/>
  <text x="290" y="295" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#cc0000">Fab 15</text>
  <text x="290" y="307" font-family="Arial" font-size="8" text-anchor="middle">N28/N22</text>
  <text x="290" y="338" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">Taichung</text>
  <text x="290" y="351" font-family="Arial" font-size="9" text-anchor="middle">(Science Park)</text>
  
  <!-- Tainan - Fab 18 (3nm) - STAR -->
  <circle cx="280" cy="480" r="35" fill="#ff0000" stroke="#990000" stroke-width="4"/>
  <text x="280" y="470" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#990000">★ Fab 18</text>
  <text x="280" y="485" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle">N3/N5/N7</text>
  <text x="280" y="498" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="#990000">3nm Production</text>
  <text x="280" y="535" font-family="Arial" font-size="11" font-weight="bold" text-anchor="middle">Tainan</text>
  <text x="280" y="548" font-family="Arial" font-size="10" text-anchor="middle">(Science Park)</text>
  
  <!-- Tainan - Fab 14 -->
  <circle cx="320" cy="465" r="18" fill="#ff6666" stroke="#cc0000" stroke-width="2"/>
  <text x="320" y="460" font-family="Arial" font-size="9" font-weight="bold" text-anchor="middle" fill="#cc0000">Fab 14</text>
  <text x="320" y="472" font-family="Arial" font-size="8" text-anchor="middle">N16/N12</text>
  
  <!-- Direction indicator -->
  <text x="50" y="100" font-family="Arial" font-size="10" fill="#666">North</text>
  <text x="50" y="580" font-family="Arial" font-size="10" fill="#666">South</text  
  <!-- Legend / Info Box -->
  <rect x="380" y="80" width="200" height="280" fill="white" stroke="#ccc" rx="5"/>
  <text x="390" y="105" font-family="Arial" font-size="13" font-weight="bold">Process Nodes:</text>
  
  <circle cx="400" cy="135" r="6" fill="#ff0000"/>
  <text x="415" y="138" font-family="Arial" font-size="10">N3 (3nm) - Most Advanced</text>
  
  <circle cx="400" cy="160" r="6" fill="#ff6666"/>
  <text x="415" y="163" font-family="Arial" font-size="10">N5 (5nm)</text>
  
  <circle cx="400" cy="185" r="6" fill="#ff8888"/>
  <text x="415" y="188" font-family="Arial" font-size="10">N7 (7nm)</text>
  
  <circle cx="400" cy="210" r="6" fill="#ffaaaa"/>
  <text x="415" y="213" font-family="Arial" font-size="10">N16/N12 (16nm/12nm)</text>
  
  <circle cx="400" cy="235" r="6" fill="#ffcccc"/>
  <text x="415" y="238" font-family="Arial" font-size="10">N22/N28 (22nm/28nm)</text>
  
  <line x1="390" y1="260" x2="570" y2="260" stroke="#ddd"/>
  
  <text x="390" y="285" font-family="Arial" font-size="12" font-weight="bold">Key Info:</text>
  <text x="390" y="305" font-family="Arial" font-size="10">★ Fab 18 is TSMC's</text>
  <text x="390" y="320" font-family="Arial" font-size="10">3nm production base</text>
  <text x="390" y="340" font-family="Arial" font-size="10">Most advanced chips</text>
  <text x="390" y="355" font-family="Arial" font-size="10">in mass production</text>
  
  <!-- Scale / Distance reference -->
  <text x="300" y="660" font-family="Arial" font-size="9" fill="#999" text-anchor="middle">Map is simplified - for reference only</text>
</svg>
