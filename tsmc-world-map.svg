<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600">
  <!-- Background -->
  <rect width="800" height="600" fill="#f0f8ff"/>
  
  <!-- Title -->
  <text x="400" y="40" font-family="Arial, sans-serif" font-size="24" font-weight="bold" text-anchor="middle">TSMC Global Fab Locations</text>
  
  <!-- World Map Outline (simplified) -->
  <!-- Americas -->
  <path d="M80,150 Q120,120 180,140 L220,200 Q200,280 150,320 L100,280 Z" fill="#d4e6d4" stroke="#888"/>
  <!-- Europe/Africa -->
  <path d="M360,120 Q400,100 440,130 L460,200 Q440,280 400,320 L360,280 Z" fill="#d4e6d4" stroke="#888"/>
  <!-- Asia/Australia -->
  <path d="M500,100 Q600,80 700,120 L720,250 Q680,320 600,340 L520,300 Z" fill="#d4e6d4" stroke="#888"/>
  
  <!-- Taiwan (highlighted) -->
  <ellipse cx="620" cy="220" rx="15" ry="25" fill="#ff4444" stroke="#cc0000" stroke-width="2"/>
  <text x="620" y="265" font-family="Arial" font-size="12" font-weight="bold" text-anchor="middle" fill="#cc0000">TAIWAN</text>
  <text x="620" y="280" font-family="Arial" font-size="10" text-anchor="middle">Main Fabs</text>
  
  <!-- USA - Arizona -->
  <circle cx="120" cy="200" r="20" fill="#4488ff" stroke="#0044cc" stroke-width="2"/>
  <text x="120" y="235" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#0044cc">USA</text>
  <text x="120" y="248" font-family="Arial" font-size="9" text-anchor="middle">Fab 21 (N5/N3)</text>
  <text x="120" y="260" font-family="Arial" font-size="9" text-anchor="middle">Arizona</text>
  
  <!-- Japan - Kumamoto -->
  <circle cx="680" cy="200" r="18" fill="#4488ff" stroke="#0044cc" stroke-width="2"/>
  <text x="680" y="232" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#0044cc">Japan</text>
  <text x="680" y="245" font-family="Arial" font-size="9" text-anchor="middle">JASM (N28/N16)</text>
  <text x="680" y="257" font-family="Arial" font-size="9" text-anchor="middle">Kumamoto</text>
  
  <!-- Germany - Dresden -->
  <circle cx="420" cy="140" r="18" fill="#4488ff" stroke="#0044cc" stroke-width="2"/>
  <text x="420" y="172" font-family="Arial" font-size="10" font-weight="bold" text-anchor="middle" fill="#0044cc">Germany</text>
  <text x="420" y="185" font-family="Arial" font-size="9" text-anchor="middle">ESMC (N28)</text>
  <text x="420" y="197" font-family="Arial" font-size="9" text-anchor="middle">Dresden (Planned)</text>
  
  <!-- Legend -->
  <rect x="50" y="380" width="200" height="100" fill="white" stroke="#ccc" rx="5"/>
  <circle cx="70" cy="405" r="8" fill="#ff4444" stroke="#cc0000"/>
  <text x="90" y="408" font-family="Arial" font-size="11">Taiwan (Main Fabs)</text>
  <circle cx="70" cy="430" r="8" fill="#4488ff" stroke="#0044cc"/>
  <text x="90" y="433" font-family="Arial" font-size="11">Overseas Fabs</text>
  
  <!-- Details Box -->
  <rect x="280" y="380" width="470" height="180" fill="white" stroke="#ccc" rx="5"/>
  <text x="290" y="405" font-family="Arial" font-size="14" font-weight="bold">Taiwan Fabs:</text>
  <text x="290" y="425" font-family="Arial" font-size="11">• Fab 18 (Tainan) - N3/N5/N7 ★ 3nm Base</text>
  <text x="290" y="442" font-family="Arial" font-size="11">• Fab 14 (Tainan) - N16/N12</text>
  <text x="290" y="459" font-family="Arial" font-size="11">• Fab 15 (Taichung) - N28/N22</text>
  <text x="290" y="476" font-family="Arial" font-size="11">• Fab 16 (Longtan) - N16</text>
  <text x="290" y="493" font-family="Arial" font-size="11">• Fab 8 (Hsinchu) - N7/N5</text>
  <text x="290" y="518" font-family="Arial" font-size="11" fill="#666">* Fab 18 in Tainan is the most advanced 3nm production base</text>
</svg>
